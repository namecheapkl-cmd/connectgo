<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="googlebot" content="noindex">
  <link rel="icon" type="image/png" sizes="32x32" href="https://i.ibb.co.com/j2GntJC/pngegg.png">
  <link rel="icon" type="image/png" sizes="16x16" href="https://i.ibb.co.com/j2GntJC/pngegg.png">
  <link rel="apple-touch-icon" sizes="180x180" href="https://i.ibb.co.com/j2GntJC/pngegg.png">
  <title>Admin Dashboard</title>
  <meta name="description" content="Admin Panel">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    .hidden { display: none !important; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 300px; }
    .modal-transition { transition: opacity 0.3s ease, visibility 0.3s ease; }
    .btn-hover-effect:hover { transform: translateY(-1px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .table-row-hover:hover { background-color: #f9fafb; }

    body {
      background-image: url('https://i.ibb.co.com/5xf2G5j5/pngegg-4.png-caacff5cfa74?q=80&w=2070&auto=format&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 0;
    }

    #loginBox, #dashboard, #editModal {
      position: relative;
      z-index: 1;
    }

    .bg-white {
      background-color: rgba(255,255,255,0.95)!important;
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body class="min-h-screen">

<!-- LOGIN -->
<div id="loginBox" class="flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-xl shadow-lg w-96">
    <div class="text-center mb-6">
      <h1 class="text-2xl font-bold text-gray-800 mb-2">Roronoa Zoro</h1>
      <p class="text-gray-600 text-sm">Kaizoku Gari no Zoro</p>
    </div>

    <input id="password" type="password" placeholder="Pirate Hunter"
      class="w-full border p-3 rounded-lg mb-4">

    <button onclick="login()"
      class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">
      LOGIN
    </button>

    <p id="loginError" class="text-red-500 text-sm mt-3 text-center hidden">
      Password salah
    </p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden p-6">

  <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-lg shadow">
    <div>
      <h1 class="text-2xl font-bold">Shortlink Dashboard</h1>
      <p class="text-sm">
        Domain: <span class="font-mono text-blue-600">https://lynkz.site</span>
      </p>
    </div>

    <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded">
      Logout
    </button>
  </div>

  <!-- FORM -->
  <div class="bg-white p-6 rounded shadow mb-6">
    <div class="flex gap-4 flex-col md:flex-row">
      <input id="slug" placeholder="slug"
        class="flex-1 border p-3 rounded">

      <input id="url" placeholder="https://target.com"
        class="flex-1 border p-3 rounded">

      <button onclick="addLink()"
        class="bg-green-600 text-white px-6 rounded">
        Tambah
      </button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="bg-white rounded shadow">
    <table class="w-full text-sm">
      <thead>
        <tr class="bg-gray-100">
          <th class="p-3 text-left">Slug</th>
          <th class="p-3 text-left">URL</th>
          <th class="p-3 text-center">Klik</th>
          <th class="p-3 text-left">Aksi</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>

</div>

<!-- EDIT MODAL -->
<div id="editModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center">
  <div class="bg-white p-6 rounded w-full max-w-md">
    <h2 class="text-lg font-bold mb-4">Edit URL</h2>

    <p class="text-sm mb-2">
      https://lynkz.site/<span id="currentSlug"></span>
    </p>

    <input id="editUrl" class="w-full border p-3 rounded mb-4">

    <div class="flex justify-end gap-2">
      <button onclick="closeEdit()">Batal</button>
      <button onclick="saveEdit()" class="bg-blue-600 text-white px-4 py-2 rounded">
        Simpan
      </button>
    </div>
  </div>
</div>

<script src="app.js"></script>

<script>
/* 🔥 FIX PREVIEW SLUG (biar hidup) */
document.getElementById("slug")?.addEventListener("input", function () {
  const preview = document.getElementById("slugPreview");
  if (preview) preview.textContent = this.value || "[slug]";
});
</script>

</body>
</html>
